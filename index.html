<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LipCoach AR</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    .icon { display: inline-block; width: 24px; height: 24px; stroke-width: 2; stroke: currentColor; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  </style>
</head>
<body class="bg-slate-100 flex justify-center items-center min-h-screen">

  <div class="w-full max-w-md h-[100vh] sm:h-[90vh] bg-white sm:rounded-3xl shadow-2xl overflow-hidden flex flex-col relative" id="app-container">
    
    <header class="bg-teal-600 text-white p-4 pt-8 sm:pt-4 flex justify-between items-center z-10 shadow-md">
      <div>
        <h1 class="text-xl font-bold tracking-wider">LipCoach AR</h1>
        <p class="text-xs text-teal-100">สวัสดี, เจมส์</p>
      </div>
      <div class="flex items-center gap-2 bg-teal-700 px-3 py-1 rounded-full">
        <span class="text-xs">🔥 5 วัน</span>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto bg-slate-50 pb-20 p-4 space-y-6">
      <div class="bg-gradient-to-r from-teal-500 to-emerald-500 rounded-2xl p-5 text-white shadow-lg">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-lg font-semibold">ความคืบหน้าของคุณ</h2>
          <span class="text-xl">🏆</span>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <p class="text-sm opacity-80">คะแนนรวม</p>
            <p class="text-2xl font-bold">1250</p>
          </div>
          <div>
            <p class="text-sm opacity-80">คำที่เรียนรู้แล้ว</p>
            <p class="text-2xl font-bold">42</p>
          </div>
        </div>
      </div>

      <div>
        <h3 class="font-bold text-gray-800 mb-3 flex items-center gap-2">⭐ ภารกิจประจำวัน</h3>
        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 space-y-3">
          <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
              <div class="bg-blue-100 p-2 rounded-full text-blue-600 text-sm">🎮</div>
              <span class="text-sm font-medium text-gray-700">ฝึกอ่านคำศัพท์ให้ถูก 10 คำ</span>
            </div>
            <span class="text-xs font-bold text-teal-600 bg-teal-50 px-2 py-1 rounded">5/10</span>
          </div>
          <div class="w-full bg-gray-200 rounded-full h-2">
            <div class="bg-teal-500 h-2 rounded-full" style="width: 50%;"></div>
          </div>
        </div>
      </div>

      <div class="bg-teal-600 text-white font-bold py-4 rounded-xl shadow-lg text-center cursor-pointer">
        ▶️ เริ่มฝึกอ่านริมฝีปากเลย
      </div>
    </main>

    <nav class="absolute bottom-0 w-full bg-white border-t border-gray-200 flex justify-around py-3 px-2 z-20">
      <button class="flex flex-col items-center justify-center w-16 h-12 text-teal-600">
        <span class="text-lg">🏠</span>
        <span class="text-[10px] font-bold mt-1">หน้าแรก</span>
      </button>
      <button class="flex flex-col items-center justify-center w-16 h-12 text-gray-400">
        <span class="text-lg">📷</span>
        <span class="text-[10px] mt-1">ฝึก AR</span>
      </button>
      <button class="flex flex-col items-center justify-center w-16 h-12 text-gray-400">
        <span class="text-lg">📍</span>
        <span class="text-[10px] mt-1">สถานการณ์</span>
      </button>
      <button class="flex flex-col items-center justify-center w-16 h-12 text-gray-400">
        <span class="text-lg">📊</span>
        <span class="text-[10px] mt-1">ผลลัพธ์</span>
      </button>
    </nav>
  </div>

</body>
</html>
