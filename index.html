<<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LipCoach AR - AI Powered</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: sans-serif; }
    .page { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body class="bg-slate-100 flex justify-center items-center min-h-screen">

  <div class="w-full max-w-md h-[90vh] bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col relative border-4 border-gray-800">
    
    <header class="bg-teal-600 text-white p-4 shadow-md">
      <h1 class="text-xl font-bold">LipCoach AR</h1>
      <p class="text-xs text-teal-100">สวัสดี, คุณ (เวอร์ชันอัจฉริยะด้วย AI)</p>
    </header>

    <main class="flex-1 overflow-y-auto p-4" id="main-content">
      <!-- หน้าแรก -->
      <div id="page-home" class="page active space-y-4">
        <div class="bg-teal-500 p-6 rounded-2xl text-white text-center">
          <h2 class="text-2xl font-bold">พร้อมฝึกหรือยัง?</h2>
          <p class="mt-2">เลือกโหมดการฝึกของคุณได้เลย</p>
        </div>
        <button onclick="showPage('page-practice')" class="w-full bg-teal-600 text-white py-4 rounded-xl font-bold hover:bg-teal-700">▶️ เริ่มฝึกเลย</button>
        
        <!-- ฟีเจอร์ใหม่: Gemini API Integration -->
        <div class="mt-6 p-4 border-2 border-dashed border-teal-300 rounded-2xl bg-teal-50">
          <h3 class="font-bold text-teal-800 mb-2">✨ ฟีเจอร์ AI อัจฉริยะ</h3>
          <p class="text-xs text-teal-600 mb-4">ให้ Gemini ช่วยสร้างสถานการณ์ฝึกฝนแบบเฉพาะตัวสำหรับคุณ</p>
          <button onclick="generateScenarioWithGemini()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition-all flex items-center justify-center gap-2">
            ✨ ให้ AI สร้างสถานการณ์ฝึก
          </button>
          <p id="ai-result" class="text-sm text-gray-700 mt-4 font-medium italic"></p>
        </div>
      </div>

      <!-- หน้าฝึกฝน -->
      <div id="page-practice" class="page space-y-4">
        <div id="practice-area" class="bg-black h-64 rounded-2xl flex items-center justify-center text-white text-center p-4">
          <div>
            <div class="text-4xl mb-2">📷</div>
            <p>ระบบกำลังจำลอง AR...</p>
            <p id="word-display" class="text-2xl font-bold mt-4 text-teal-400">คำที่ต้องพูด: "สวัสดี"</p>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <button onclick="checkAnswer(true)" class="bg-green-500 text-white py-3 rounded-lg font-bold">✅ พูดถูก</button>
          <button onclick="checkAnswer(false)" class="bg-red-500 text-white py-3 rounded-lg font-bold">❌ พูดผิด</button>
        </div>
      </div>
    </main>

    <!-- Nav -->
    <nav class="border-t flex justify-around py-3 bg-white">
      <button onclick="showPage('page-home')" class="text-teal-600 font-bold">🏠 หน้าแรก</button>
      <button onclick="showPage('page-practice')" class="text-gray-500">📷 ฝึก AR</button>
    </nav>
  </div>

  <script>
    const apiKey = ""; // ใส่ API Key ของคุณที่นี่

    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
    }

    async function generateScenarioWithGemini() {
      const resultArea = document.getElementById('ai-result');
      resultArea.innerText = "กำลังให้ AI คิดสถานการณ์ให้... รอสักครู่ครับ ✨";
      
      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: "ช่วยคิดสถานการณ์ในชีวิตประจำวันสั้นๆ ที่น่าสนใจสำหรับการฝึกอ่านปาก 1 สถานการณ์ พร้อมระบุคำสำคัญที่ใช้ฝึก 3 คำ" }] }]
          })
        });

        const data = await response.json();
        const aiText = data.candidates[0].content.parts[0].text;
        resultArea.innerText = aiText;
      } catch (error) {
        resultArea.innerText = "ขออภัยครับ ฟีเจอร์ AI กำลังปรับปรุง หรือกรุณาตรวจสอบ API Key อีกครั้ง";
      }
    }

    function checkAnswer(isCorrect) {
      if(isCorrect) {
        alert("ยอดเยี่ยม! คุณพูดถูกต้อง");
      } else {
        alert("ลองใหม่อีกครั้งนะครับ คุณทำได้!");
      }
    }
  </script>
</body>
</html>
